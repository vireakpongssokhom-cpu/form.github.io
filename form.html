<!doctype html>
<html lang="km">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homework</title>
  </head>
  <body style="font-family: Khmer OS Battambang">
    <form style="width: 40%; margin: 20px auto">
      <fieldset style="border-color: darkblue">
        <legend style="color: darkblue; font-weight: bold; padding: 0 10px">
          ១. ព័ត៌មានផ្ទាល់ខ្លួន
        </legend>

        <label for="txtបញ្ចូលឈ្មោះ">ឈ្មោះពេញ:</label><br />
        <input
          type="text"
          id="txtបញ្ចូលឈ្មោះ"
          name="txtបញ្ចូលឈ្មោះ"
          placeholder="បញ្ចូលឈ្មោះ"
          style="width: 95%; padding: 5px; margin-top: 5px"
          required
        /><br />

        <label for="txtថ្ងៃខែឆ្នាំកំណើត">ថ្ងៃខែឆ្នាំកំណើត:</label><br />
        <input
          type="date"
          id="txtថ្ងៃខែឆ្នាំកំណើត"
          name="txtថ្ងៃខែឆ្នាំកំណើត"
          style="width: 95%; padding: 5px; margin-top: 5px"
          required
        /><br />

        <label>ភេទ:</label><br />
        <input type="radio" name="gender" id="gender_male" value="male" />
        <label for="gender_male">ប្រុស</label>

        <input type="radio" name="gender" id="gender_female" value="female" />
        <label for="gender_female">ស្រី</label><br />

        <label for="selectProvince">ខេត្ត/រាជធានីកំណើត:</label><br />
        <select
          name="province"
          id="selectProvince"
          style="width: 95%; padding: 5px; margin-top: 5px"
          required
        >
          <option value="">--- ជ្រើសរើសខេត្ត/រាជធានី ---</option>
          <option value="phnom_penh">រាជធានីភ្នំពេញ</option>
          <option value="banteay_meanchey">ខេត្តបន្ទាយមានជ័យ</option>
          <option value="battambang">ខេត្តបាត់ដំបង</option>
          <option value="kampong_cham">ខេត្តកំពង់ចាម</option>
          <option value="kampong_chhnang">ខេត្តកំពង់ឆ្នាំង</option>
          <option value="kampong_speu">ខេត្តកំពង់ស្ពឺ</option>
          <option value="kampong_thom">ខេត្តកំពង់ធំ</option>
          <option value="kampot">ខេត្តកំពត</option>
          <option value="kandal">ខេត្តកណ្តាល</option>
          <option value="koh_kong">ខេត្តកោះកុង</option>
          <option value="kratie">ខេត្តក្រចេះ</option>
          <option value="mondulkiri">ខេត្តមណ្ឌលគីរី</option>
          <option value="preah_vihear">ខេត្តព្រះវិហារ</option>
          <option value="prey_veng">ខេត្តព្រៃវែង</option>
          <option value="pursat">ខេត្តពោធិ៍សាត់</option>
          <option value="ratanakiri">ខេត្តរតនគីរី</option>
          <option value="siem_reap">ខេត្តសៀមរាប</option>
          <option value="preah_sihanouk">ខេត្តព្រះសីហនុ</option>
          <option value="stung_treng">ខេត្តស្ទឹងត្រែង</option>
          <option value="svay_rieng">ខេត្តស្វាយរៀង</option>
          <option value="takeo">ខេត្តតាកែវ</option>
          <option value="oddar_meanchey">ខេត្តឧត្តរមានជ័យ</option>
          <option value="kep">ខេត្តកែប</option>
          <option value="pailin">ខេត្តប៉ៃលិន</option>
          <option value="tbong_khmum">ខេត្តត្បូងឃ្មុំ</option></select
        ><br />
      </fieldset>

      <fieldset style="border-color: darkblue">
        <legend style="color: darkblue; font-weight: bold; padding: 0 10px">
          ២.ព័ត៌មានការសិក្សា
        </legend>
        <label for="txtឆ្នាំសិក្សា">ឆ្នាំសិក្សា:</label><br />
        <select name="" id="" style="width: 95%; padding: 5px; margin-top: 5px">
          <option value="">ឆ្នាំទី១</option>
          <option value="">ឆ្នាំទី២</option>
          <option value="">ឆ្នាំទី៣</option>
          <option value="">ឆ្នាំទី៤</option></select
        ><br />
        <label for="txtជំនាញដែលចូលចិត្ត">ជំនាញដែលចូលចិត្ត:</label><br />
        <input type="checkbox" name="" id="" />Web Dev <br />
        <input type="checkbox" name="" id="" />UI/UX Design <br />
        <input type="checkbox" name="" id="" />Networking 
      </fieldset>
      <fieldset style="border-color: darkblue">
        <legend style="color: darkblue; font-weight: bold; padding: 0 10px">
          <label for="txtគណនីសុវត្ថិភាព ">៣.គណនីសុវត្ថិភាព</label>
        </legend>
        <label for="txtអុីម៉៉ែល">អុីម៉ែល:</label>
        <input
          type="text"
          placeholder="example@email.com"
          id=""
          style="width: 95%; padding: 5px; margin-top: 5px"
          required
        /><br />
        <label for="txtលេខកូដសម្ងាត់">លេខកូដសម្ងាត់:</label><br />
        <input
          type="text"
          name="លេខកូដសម្ងាត់"
          placeholder="បញ្ចូលលេខកូដ"
          style="width: 95%; padding: 5px; margin-top: 5px"
          required
        />
      </fieldset>
      <br />
      <center>
        <button
          style="
            background-color: darkgreen;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-family: Khmer OS Battambang;
          "
          type="submi;"
        >
          រក្សាទុក (Submit)
        </button>
        <button
          type="submit"
          style="
            background-color: rgb(219, 23, 23);
            border-radius: 4px;
            cursor: pointer;
            border: none;
            font-family: Khmer OS Battambang;
          "
        >
          ថយក្រោយ (Back)
        </button>
      </center>
    </form>
  </body>
</html>
